<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120">

  <!-- ═══ MARK (100×100, centred vertically at left) ═══ -->
  <rect x="10" y="10" width="100" height="100" rx="22" fill="#080B18"/>

  <!-- Stars in mark background -->
  <circle cx="22" cy="22" r="1.4" fill="#F5F0E8" fill-opacity="0.50"/>
  <circle cx="98" cy="18" r="1.0" fill="#F5F0E8" fill-opacity="0.38"/>
  <circle cx="102" cy="88" r="1.1" fill="#A78BFA" fill-opacity="0.55"/>

  <defs>
    <clipPath id="m-rb"><rect x="0" y="0"  width="440" height="60"/></clipPath>
    <clipPath id="m-rf"><rect x="0" y="60" width="440" height="120"/></clipPath>

    <radialGradient id="m-pg" cx="27%" cy="21%" r="72%">
      <stop offset="0%"   stop-color="#FFD490"/>
      <stop offset="12%"  stop-color="#F2A044"/>
      <stop offset="42%"  stop-color="#D4780A"/>
      <stop offset="100%" stop-color="#5C2A02"/>
    </radialGradient>
    <radialGradient id="m-atmo" cx="50%" cy="50%" r="50%">
      <stop offset="78%"  stop-color="#D4780A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0.18"/>
    </radialGradient>
    <radialGradient id="m-spec" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="m-ri" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C4B0FC" stop-opacity="0.05"/>
      <stop offset="25%"  stop-color="#C4B0FC" stop-opacity="0.88"/>
      <stop offset="50%"  stop-color="#D8CCFF" stop-opacity="1.00"/>
      <stop offset="75%"  stop-color="#C4B0FC" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#C4B0FC" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="m-rm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#A78BFA" stop-opacity="0.05"/>
      <stop offset="25%"  stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#BBA8FC" stop-opacity="1.00"/>
      <stop offset="75%"  stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="m-ro" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8B74E0" stop-opacity="0.00"/>
      <stop offset="25%"  stop-color="#8B74E0" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#9D88E8" stop-opacity="0.70"/>
      <stop offset="75%"  stop-color="#8B74E0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B74E0" stop-opacity="0.00"/>
    </linearGradient>
  </defs>

  <!-- Rings back -->
  <ellipse cx="60" cy="60" rx="44" ry="13"   fill="none" stroke="url(#m-ro)" stroke-width="2.2" transform="rotate(-22,60,60)" clip-path="url(#m-rb)"/>
  <ellipse cx="60" cy="60" rx="40.2" ry="11.8" fill="none" stroke="#080B18" stroke-width="3.0" transform="rotate(-22,60,60)" clip-path="url(#m-rb)"/>
  <ellipse cx="60" cy="60" rx="36.5" ry="10.7" fill="none" stroke="url(#m-rm)" stroke-width="4.0" transform="rotate(-22,60,60)" clip-path="url(#m-rb)"/>
  <ellipse cx="60" cy="60" rx="32.8" ry="9.6"  fill="none" stroke="#080B18" stroke-width="3.0" transform="rotate(-22,60,60)" clip-path="url(#m-rb)"/>
  <ellipse cx="60" cy="60" rx="29.5" ry="8.6"  fill="none" stroke="url(#m-ri)" stroke-width="2.5" transform="rotate(-22,60,60)" clip-path="url(#m-rb)"/>

  <!-- Planet -->
  <circle cx="60" cy="60" r="24" fill="url(#m-pg)"/>
  <circle cx="60" cy="60" r="24" fill="url(#m-atmo)"/>
  <ellipse cx="60" cy="56" rx="18" ry="5"  fill="#B86508" fill-opacity="0.22"/>
  <ellipse cx="60" cy="64" rx="14" ry="3"  fill="#5C2A02" fill-opacity="0.20"/>
  <ellipse cx="49" cy="47" rx="8"  rx="8" ry="6.5" fill="url(#m-spec)"/>

  <!-- Rings front -->
  <ellipse cx="60" cy="60" rx="29.5" ry="8.6"  fill="none" stroke="url(#m-ri)" stroke-width="2.5" transform="rotate(-22,60,60)" clip-path="url(#m-rf)"/>
  <ellipse cx="60" cy="60" rx="32.8" ry="9.6"  fill="none" stroke="#080B18" stroke-width="3.0" transform="rotate(-22,60,60)" clip-path="url(#m-rf)"/>
  <ellipse cx="60" cy="60" rx="36.5" ry="10.7" fill="none" stroke="url(#m-rm)" stroke-width="4.0" transform="rotate(-22,60,60)" clip-path="url(#m-rf)"/>
  <ellipse cx="60" cy="60" rx="40.2" ry="11.8" fill="none" stroke="#080B18" stroke-width="3.0" transform="rotate(-22,60,60)" clip-path="url(#m-rf)"/>
  <ellipse cx="60" cy="60" rx="44" ry="13"     fill="none" stroke="url(#m-ro)" stroke-width="2.2" transform="rotate(-22,60,60)" clip-path="url(#m-rf)"/>

  <!-- ═══ WORDMARK ═══ -->
  <text x="128" y="68"
    font-family="'Space Grotesk','Inter',system-ui,sans-serif"
    font-weight="700" font-size="38" letter-spacing="-0.8"
    fill="#F5F0E8">NightQuest</text>

  <!-- Tagline — updated once confirmed -->
  <text x="130" y="90"
    font-family="'DM Sans','Inter',system-ui,sans-serif"
    font-weight="400" font-size="14" letter-spacing="0.6"
    fill="#A78BFA">Your night sky awaits</text>

</svg>
