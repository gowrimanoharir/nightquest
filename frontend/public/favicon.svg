<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#080B18"/>

  <!-- Star dots -->
  <circle cx="5"  cy="6"  r="0.9" fill="#F5F0E8" fill-opacity="0.55"/>
  <circle cx="27" cy="5"  r="0.7" fill="#F5F0E8" fill-opacity="0.40"/>
  <circle cx="28" cy="26" r="0.7" fill="#A78BFA" fill-opacity="0.60"/>

  <defs>
    <clipPath id="rb"><rect x="0" y="0"  width="32" height="16"/></clipPath>
    <clipPath id="rf"><rect x="0" y="16" width="32" height="16"/></clipPath>

    <radialGradient id="pg" cx="27%" cy="21%" r="72%">
      <stop offset="0%"   stop-color="#FFD490"/>
      <stop offset="12%"  stop-color="#F2A044"/>
      <stop offset="42%"  stop-color="#D4780A"/>
      <stop offset="100%" stop-color="#5C2A02"/>
    </radialGradient>

    <linearGradient id="ri" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C4B0FC" stop-opacity="0.05"/>
      <stop offset="25%"  stop-color="#C4B0FC" stop-opacity="0.88"/>
      <stop offset="50%"  stop-color="#D8CCFF" stop-opacity="1.00"/>
      <stop offset="75%"  stop-color="#C4B0FC" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#C4B0FC" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="rm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#A78BFA" stop-opacity="0.05"/>
      <stop offset="25%"  stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#BBA8FC" stop-opacity="1.00"/>
      <stop offset="75%"  stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="ro" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8B74E0" stop-opacity="0.00"/>
      <stop offset="25%"  stop-color="#8B74E0" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#9D88E8" stop-opacity="0.70"/>
      <stop offset="75%"  stop-color="#8B74E0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B74E0" stop-opacity="0.00"/>
    </linearGradient>
  </defs>

  <!-- RINGS BACK -->
  <ellipse cx="16" cy="16" rx="14.5" ry="4.2"  fill="none" stroke="url(#ro)" stroke-width="1.0" transform="rotate(-22,16,16)" clip-path="url(#rb)"/>
  <ellipse cx="16" cy="16" rx="13.2" ry="3.85" fill="none" stroke="#080B18" stroke-width="1.2" transform="rotate(-22,16,16)" clip-path="url(#rb)"/>
  <ellipse cx="16" cy="16" rx="12.0" ry="3.5"  fill="none" stroke="url(#rm)" stroke-width="1.6" transform="rotate(-22,16,16)" clip-path="url(#rb)"/>
  <ellipse cx="16" cy="16" rx="10.9" ry="3.15" fill="none" stroke="#080B18" stroke-width="1.1" transform="rotate(-22,16,16)" clip-path="url(#rb)"/>
  <ellipse cx="16" cy="16" rx="9.8"  ry="2.85" fill="none" stroke="url(#ri)" stroke-width="1.3" transform="rotate(-22,16,16)" clip-path="url(#rb)"/>

  <!-- PLANET -->
  <circle cx="16" cy="16" r="8.5" fill="url(#pg)"/>

  <!-- RINGS FRONT -->
  <ellipse cx="16" cy="16" rx="9.8"  ry="2.85" fill="none" stroke="url(#ri)" stroke-width="1.3" transform="rotate(-22,16,16)" clip-path="url(#rf)"/>
  <ellipse cx="16" cy="16" rx="10.9" ry="3.15" fill="none" stroke="#080B18" stroke-width="1.1" transform="rotate(-22,16,16)" clip-path="url(#rf)"/>
  <ellipse cx="16" cy="16" rx="12.0" ry="3.5"  fill="none" stroke="url(#rm)" stroke-width="1.6" transform="rotate(-22,16,16)" clip-path="url(#rf)"/>
  <ellipse cx="16" cy="16" rx="13.2" ry="3.85" fill="none" stroke="#080B18" stroke-width="1.2" transform="rotate(-22,16,16)" clip-path="url(#rf)"/>
  <ellipse cx="16" cy="16" rx="14.5" ry="4.2"  fill="none" stroke="url(#ro)" stroke-width="1.0" transform="rotate(-22,16,16)" clip-path="url(#rf)"/>
</svg>
